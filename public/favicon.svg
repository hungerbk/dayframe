<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 우상단 조각 (0°→90°) — 북동쪽으로 살짝 분리 -->
  <path transform="translate(2.5, -2.5)"
        d="M16 3.5 A12.5 12.5 0 0 1 28.5 16 L21.5 16 A5.5 5.5 0 0 0 16 10.5 Z"
        fill="#FF6B6B" stroke="white" stroke-width="1" stroke-linejoin="round"/>
  <!-- 우하단 (90°→180°) -->
  <path d="M28.5 16 A12.5 12.5 0 0 1 16 28.5 L16 21.5 A5.5 5.5 0 0 0 21.5 16 Z"
        fill="#FF8E8E" stroke="white" stroke-width="1" stroke-linejoin="round"/>
  <!-- 좌하단 (180°→270°) -->
  <path d="M16 28.5 A12.5 12.5 0 0 1 3.5 16 L10.5 16 A5.5 5.5 0 0 0 16 21.5 Z"
        fill="#FFB3B3" stroke="white" stroke-width="1" stroke-linejoin="round"/>
  <!-- 좌상단 (270°→360°) -->
  <path d="M3.5 16 A12.5 12.5 0 0 1 16 3.5 L16 10.5 A5.5 5.5 0 0 0 10.5 16 Z"
        fill="#FFD6D6" stroke="white" stroke-width="1" stroke-linejoin="round"/>
</svg>
